<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Cadastro de clientes</title>
    <h:outputStylesheet library="css" name="app.css"/>
</h:head>
<h:body>
    <ui:include src="/templates/topo.xhtml"/>

    <main class="container">
        <h1>Cadastro de clientes</h1>

        <h:form id="formCliente" styleClass="panel">
            <p:messages id="mensagens" closable="true"/>

            <div class="grid">
                <div class="field">
                    <p:outputLabel for="nome" value="Nome"/>
                    <p:inputText id="nome" value="#{clienteBean.cliente.nome}" required="true" maxlength="120"/>
                </div>

                <div class="field">
                    <p:outputLabel for="cpf" value="CPF"/>
                    <p:inputMask id="cpf" value="#{clienteBean.cliente.cpf}" mask="999.999.999-99" required="true"/>
                </div>

                <div class="field">
                    <p:outputLabel for="email" value="E-mail"/>
                    <p:inputText id="email" value="#{clienteBean.cliente.email}" required="true" maxlength="120"/>
                </div>

                <div class="field">
                    <p:outputLabel for="telefone" value="Telefone"/>
                    <p:inputMask id="telefone" value="#{clienteBean.cliente.telefone}" mask="(99) 99999-9999"/>
                </div>

                <div class="field">
                    <p:outputLabel for="dataNascimento" value="Data de nascimento"/>
                    <p:datePicker id="dataNascimento"
                                  value="#{clienteBean.cliente.dataNascimento}"
                                  pattern="dd/MM/yyyy"
                                  showIcon="true"/>
                </div>
            </div>

            <div class="actions">
                <p:commandButton value="Salvar" action="#{clienteBean.salvar}" update="@form tabelaClientes"/>
                <p:commandButton value="Novo" action="#{clienteBean.novo}" update="@form" styleClass="ui-button-secondary"/>
            </div>
        </h:form>

        <h:form id="tabelaClientes" styleClass="panel">
            <p:dataTable value="#{clienteBean.clientes}" var="clienteLinha" emptyMessage="Nenhum cliente cadastrado.">
                <p:column headerText="Nome" sortBy="#{clienteLinha.nome}">
                    <h:outputText value="#{clienteLinha.nome}"/>
                </p:column>
                <p:column headerText="CPF">
                    <h:outputText value="#{clienteLinha.cpf}"/>
                </p:column>
                <p:column headerText="E-mail">
                    <h:outputText value="#{clienteLinha.email}"/>
                </p:column>
                <p:column headerText="Telefone">
                    <h:outputText value="#{clienteLinha.telefone}"/>
                </p:column>
                <p:column headerText="Acoes" styleClass="table-actions">
                    <p:commandButton value="Editar"
                                     action="#{clienteBean.editar(clienteLinha)}"
                                     update="formCliente"
                                     styleClass="ui-button-secondary"/>
                    <p:commandButton value="Excluir"
                                     action="#{clienteBean.excluir(clienteLinha)}"
                                     update="@form formCliente"
                                     styleClass="ui-button-danger"/>
                </p:column>
            </p:dataTable>
        </h:form>
    </main>
</h:body>
</html>
